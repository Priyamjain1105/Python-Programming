<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>{% block title %}DSA Tracker{% endblock %}</title>

    <style>
        /* Futuristic theme */
        :root {
            --bg: #0a0f1e;
            --card: #151d33;
            --text: #e6eef8;
            --muted: #8a96b8;
            --accent: #0ef6cc;
            --radius: 14px;
            --transition: all 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* Header */
        header {
            background: linear-gradient(90deg, #111827, #0a0f1e);
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .brand {
            font-weight: 800;
            font-size: 20px;
            color: var(--accent);
            text-decoration: none;
            letter-spacing: 1px;
        }

        nav {
            display: flex;
            gap: 16px;
        }

        nav a {
            text-decoration: none;
            color: var(--muted);
            font-weight: 600;
            transition: var(--transition);
            padding: 6px 10px;
            border-radius: var(--radius);
        }

        nav a:hover {
            background: var(--card);
            color: var(--accent);
        }

        /* Main content */
        main {
            max-width: 1100px;
            margin: 30px auto;
            padding: 20px;
            border-radius: var(--radius);
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), transparent);
            box-shadow: 0 0 20px rgba(14, 246, 204, 0.1);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 16px;
            background: #111827;
            color: var(--muted);
            font-size: 14px;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Neon glow hover */
        .neon-btn {
            background: transparent;
            border: 2px solid var(--accent);
            color: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 700;
            transition: var(--transition);
        }

        .neon-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 12px var(--accent);
        }

        /* Small responsive tweaks */
        @media(max-width:768px) {
            nav {
                display: none;
            }

            .menu-toggle {
                display: block;
                background: none;
                border: none;
                font-size: 20px;
                color: var(--accent);
                cursor: pointer;
            }
        }

        .menu-toggle {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <a href="{{ url_for('home') }}" class="brand">⚡ DSA Tracker</a>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="#">Problems</a>
            <a href="#">Stats</a>
            <a href="#">About</a>
        </nav>
        <button class="menu-toggle" id="menuBtn">☰</button>
    </header>

    <!-- Page content -->
    <main>
        {% block content %}
        <h1>Welcome to your DSA Tracker</h1>
        <p class="muted">Track problems solved, analyze stats, and grow your skills 🚀</p>
        <button class="neon-btn">Get Started</button>
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer>
        &copy; {{ current_year }} DSA Tracker — Built with Flask & 💻
    </footer>

    <!-- Inline JS -->
    <script>
        // Responsive menu toggle
        const menuBtn = document.getElementById('menuBtn');
        const nav = document.querySelector('nav');
        menuBtn.addEventListener('click', () => {
            if (nav.style.display === 'flex') {
                nav.style.display = 'none';
            } else {
                nav.style.display = 'flex';
                nav.style.flexDirection = 'column';
                nav.style.gap = '10px';
                nav.style.background = '#111827';
                nav.style.padding = '10px';
            }
        });
    </script>
</body>

</html>
